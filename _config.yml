# ===== 사이트 기본 정보 =====
title: "oeuvreals"
name: "JM"
description: "포트폴리오 · 개인적인 글 · 음악 · 포커 공부 노트"
url: "https://oeuvreals.github.io"
locale: "ko-KR"

# ===== 테마 (remote_theme: GitHub Pages가 자동 빌드) =====
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"   # default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

search: true   # 우상단 검색 활성화

# ===== 작성자 프로필 (왼쪽 사이드바) =====
author:
  name: "JM"
  bio: ""
  # avatar: "/assets/images/bio-photo.jpg"   # 프로필 사진을 넣으면 이 줄의 # 를 지우세요
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/oeuvreals"
    # - label: "Email"
    #   icon: "fas fa-fw fa-envelope"
    #   url: "mailto:you@example.com"
    # - label: "LinkedIn"
    #   icon: "fab fa-fw fa-linkedin"
    #   url: "https://www.linkedin.com/in/..."

# 페이지 하단 footer 링크
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/oeuvreals"

# ===== 빌드 설정 =====
markdown: kramdown
highlighter: rouge
paginate: 5
paginate_path: /page:num/
timezone: Asia/Seoul

# _pages 폴더를 빌드에 포함 (없으면 하위 페이지가 안 만들어짐)
include:
  - _pages

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-sitemap

# ===== 컬렉션 (포폴 / 음악 / 포커) =====
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
  music:
    output: true
    permalink: /:collection/:path/
  poker:
    output: true
    permalink: /:collection/:path/

# ===== 글/페이지 공통 기본값 =====
defaults:
  # 블로그 글
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
      show_date: true
  # 일반 페이지
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # 포폴
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true
  # 음악
  - scope:
      path: ""
      type: music
    values:
      layout: single
      author_profile: false
  # 포커
  - scope:
      path: ""
      type: poker
    values:
      layout: single
      author_profile: true
      read_time: true

# 빌드에서 제외
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .jekyll-cache
