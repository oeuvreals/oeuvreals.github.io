#  연도별 명반 목록 (Music 탭)
#  - 화면에는 가장 위가 2026년, 가장 아래가 1986년으로 표시됩니다.
#  - 한 연도가 한 줄(가로 스크롤)로 나옵니다.
#
#  앨범 추가하는 법:
#   1) 앨범 커버 이미지를 assets/images/albums/ 폴더에 넣기
#        예) assets/images/albums/ok-computer.jpg
#   2) 아래에서 원하는 연도(year)를 찾아 albums: 밑에 항목 추가
#        - cover: /assets/images/albums/ok-computer.jpg
#          title: "OK Computer"
#          artist: "Radiohead"
#   3) 저장 → git add/commit/push 하면 사이트에 반영됩니다.
#
#  (cover만 필수, title/artist는 비워도 됩니다. 비우면 커버만 표시)
# ============================================================

