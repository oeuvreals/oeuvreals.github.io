<!-- 다크 남색 톤 통일 + 모던/세련 타이포 & 크롬 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f1b2e;         /* 사이트 배경(다크 남색) */
    --bg-soft: #16273f;    /* 카드/보조 배경 */
    --bg-deep: #0b1422;    /* 푸터 */
    --accent: #5fb3c4;     /* 포인트(청록) */
    --text: #e6e9ef;
    --text-dim: #8a96a8;
  }

  /* ===== 전체 배경 통일 ===== */
  body { background-color: var(--bg); }
  .archive__item-teaser { background-color: var(--bg-soft); }
  .toc, .toc .nav__title { background-color: var(--bg-soft); }
  .page__footer { background-color: var(--bg-deep); }
  .page__footer,
  .page__footer-copyright,
  .page__footer a { color: var(--text-dim); }

  /* ===== 상단 네비게이션: 배너 없는 느낌(배경 동일 + 경계선 제거) ===== */
  /* 스킨 기본 회색을 남색으로 덮고, 스크롤 시 은은한 블러로만 구분 */
  .masthead {
    background-color: rgba(15, 27, 46, 0.72);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid transparent;   /* 경계선 제거 */
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .masthead__inner-wrap { padding-top: 1rem; padding-bottom: 1rem; }
  /* 네비 자체는 투명 → 위 masthead 색이 그대로 비침 */
  .greedy-nav,
  .greedy-nav .visible-links,
  .greedy-nav__toggle,
  .greedy-nav button { background: transparent; }
  /* 접힌 메뉴(모바일 드롭다운)만 불투명 남색 */
  .greedy-nav .hidden-links { background: var(--bg-soft); border: 0; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
  .greedy-nav .hidden-links:before { border-bottom-color: var(--bg-soft); }

  /* ===== 네비 링크: 여백/호버 다듬기 ===== */
  .greedy-nav a {
    color: #c9d3e0;
    letter-spacing: 0.01em;
    transition: color .18s ease;
  }
  .greedy-nav a:hover { color: #ffffff; }
  /* 링크 밑줄 애니메이션을 포인트 색으로 */
  .greedy-nav .visible-links a:before {
    height: 2px;
    background: var(--accent);
  }
  .greedy-nav .search__toggle { color: var(--accent); }
  .greedy-nav .search__toggle:hover { color: #ffffff; }

  /* ===== 타이포: Inter + 가벼운 굵기 ===== */
  html { font-size: 16px; }
  body,
  h1, h2, h3, h4, h5, h6,
  .page__title, .archive__item-title,
  .greedy-nav a, .site-title, button, input {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
  }
  h1, h2, h3, h4, h5, h6,
  .page__title, .archive__item-title,
  .masthead .site-title, .greedy-nav a {
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  strong, b { font-weight: 500; }

  /* ===== 히어로 배너 제목 / 부제 ===== */
  .page__hero--overlay .page__title {
    font-family: "Space Grotesk", "Inter", sans-serif;
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .page__lead { font-weight: 300; font-size: 1.1rem; }
  /* 히어로 버튼(Projects 등) 모던하게 */
  .page__hero--overlay .btn--light-outline {
    border-color: rgba(255,255,255,.35);
    border-radius: 999px;
    padding: 0.5em 1.4em;
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: background .2s ease, border-color .2s ease;
  }
  .page__hero--overlay .btn--light-outline:hover {
    background: rgba(255,255,255,.08);
    border-color: #ffffff;
  }

  /* ===== 링크/포인트 색 통일 ===== */
  a { transition: color .18s ease; }
  .page__content a:not(.btn) { color: var(--accent); }

  /* ===== 전역 스크롤바(웹킷) ===== */
  ::-webkit-scrollbar { width: 10px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #24395a; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #2f4a72; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
